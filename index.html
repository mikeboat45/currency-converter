<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/reset.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
    <title>Currency Converter</title>
  </head>
  <body>
    <header>
      <div class="heading">
        <img src="assets/images/logo.svg" alt="FX Checker" class="logo" />

        <p>55 Currencies · EOD · ECB DATA</p>
        <!-- change currency number to display dynamically -->
      </div>

      <div class="ticker-wrap" aria-label="Live Market Rates">
        <div class="ticker-track" id="ticker-track">
          <!-- dynamically insert items here. To make the scroll infinite and     
              seamless, we will duplicate the set of items in JS so it loop-  
              scrolls smoothly. Use css keyframes for lateral scrolling -->
        </div>
      </div>
    </header>

    <main>
      <section id="convertion-area">
        <p>CHECK THE RATE</p>

        <div class="converter-container">
          <div class="convert">
            <div class="input-group">
              <div class="field-box">
                <label for="send-input">SEND</label>
                <input
                  type="number"
                  id="send-input"
                  value="1000"
                  min="0"
                  step="any"
                  aria-describedby="send-currency-code"
                />
              </div>

              <!--dropdown on click-->
              <button
                type="button"
                class="currency-select-btn"
                id="send-currency-btn"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-label="Select send currency"
              >
                <img
                  src="assets/images/flags/us.webp"
                  alt="US dollar"
                  class="flag-icon"
                />
                <span class="currency-code">USD</span>

                <!-- Arrow/Chevron SVG icon -->
              </button>
            </div>

            <button id="swap">swap</button>
            <!--add logic-->

            <div class="output-group">
              <div class="field-box">
                <label for="receive-output">RECEIVE</label>
                <input
                  type="number"
                  id="receive-output"
                  class="button--submit"
                  value=""
                  min="0"
                  step="any"
                  aria-describedby="receive-currency-code"
                />
              </div>

              <!--dropdown on click-->
              <button
                type="button"
                class="currency-select-btn"
                id="receive-currency-btn"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-label="Select receive currency"
              >
                <img
                  src="assets/images/flags/eu.webp"
                  alt="Euro"
                  class="flag-icon"
                />
                <span class="currency-code">EUR</span>

                <!-- Arrow/Chevron SVG icon -->
              </button>
            </div>
          </div>

          <hr />

          <div class="convert-adjacent">
            <p>exchange rate</p>
            <!--to be dynamic-->

            <div>
              <!--state management-->
              <button>Favorite</button>
              <button>Log Conversion</button>
            </div>
          </div>
        </div>
      </section>

      <!--tabs and details-->
      <div role="tablist" aria-label="FX Checker Sections">
        <!--change hidden for larger screens with js-->
        <button
          role="tab"
          aria-selected="true"
          aria-controls="panel-history"
          id="tab-history"
        >
          History
        </button>
        <button
          role="tab"
          aria-selected="false"
          aria-controls="panel-compare"
          id="tab-compare"
          tabindex="-1"
        >
          Compare
        </button>
        <button
          role="tab"
          aria-selected="false"
          aria-controls="panel-favorites"
          id="tab-favorites"
          tabindex="-1"
        >
          Favorites
        </button>
        <button
          role="tab"
          aria-selected="false"
          aria-controls="panel-log"
          id="tab-log"
          tabindex="-1"
        >
          Log
        </button>
      </div>

      <section id="panel-history" role="tabpanel" aria-labelledby="tab-history">
        <!--history tab details-->
      </section>

      <section id="panel-compare" role="tabpanel" aria-labelledby="tab-compare">
        <!--compare tab details-->
      </section>

      <section
        id="panel-favorites"
        role="tabpanel"
        aria-labelledby="tab-favorites"
      >
        <!--favorites tab details-->
      </section>

      <section id="panel-log" role="tabpanel" aria-labelledby="tab-log">
        <!--log tab details-->
      </section>
    </main>
  </body>
</html>
